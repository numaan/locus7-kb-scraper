sitemaps: []
allow:
  - /docs/concepts/configuration/
deny:
  - /zh-cn/
  - /ja/
  - /ko/
  - /fr/
  - /de/
  - /es/
  - /pt-br/
  - /ru/
content_selector: ".td-content"
max_pages: 20
rate_limit_s: 1.0
enabled: true
