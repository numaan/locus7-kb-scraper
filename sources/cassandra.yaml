id: cassandra
name: Apache Cassandra
component: cassandra
license: "Apache-2.0"
license_url: https://www.apache.org/licenses/LICENSE-2.0
usage: open
base_url: https://cassandra.apache.org/doc/latest/
# No reliable sitemap for the versioned docs → bounded same-site crawl.
sitemaps: []
allow:
  - /doc/latest/
deny:
  - /doc/latest/cql/    # very large generated CQL grammar pages (optional: re-enable if wanted)
content_selector: "article"
max_pages: 150
rate_limit_s: 1.0
enabled: true
